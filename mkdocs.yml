site_name: CARDIAX Documentation

theme:
  name: material

nav:
  - Home: index.md
  
  - Tutorials:

      - Introductory:

        - Poisson:
          - Mathematical Description: tutorials/Introductory/Poisson/poisson_00.md
          - Isotropic: tutorials/Introductory/Poisson/poisson_01.md
          - Anisotropic: tutorials/Introductory/Poisson/poisson_02.md
          - Boundary Integrals: tutorials/Introductory/Poisson/poisson_03.md
          - Combination: tutorials/Introductory/Poisson/poisson_04.md

        - NeoHookean:
          - Mathematical Description: tutorials/Introductory/NeoHookean/neohookean_00.md
          - Beam Bending: tutorials/Introductory/NeoHookean/neohookean_01.md
          - Twisting Cube: tutorials/Introductory/NeoHookean/neohookean_02.md
          - JAX-Aware Implementation for Changing Boundary Conditions: tutorials/Introductory/NeoHookean/neohookean_03.md

      - Intermediate:
        - Hyperelasticity: tutorials/Intermediate/hyperelasticity.md
        - Inverse_Problems: tutorials/Intermediate/inverse_problems.md

      - Advanced:
        - Dynamic_Problems: tutorials/Advanced/dynamic_problems.md
        - Parameter_Estimation: tutorials/Advanced/parameter_estimation.md

      - Cardiac_Modeling:
        - Fiber_Generation: tutorials/Cardiac_Modeling/LDRBM.md
        - Monodomain: tutorials/Cardiac_Modeling/monodomain.md
        - Myocardium: tutorials/Cardiac_Modeling/myocardium.md

  - API:
      - Main Functionality: api/main_functionality.md
      - Mesh Generation: api/mesh_generation.md
      - Post Processing: api/post_processing.md
  - Limitations: limitations.md


plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: ["src"]

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js